<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DESCENT — World 3324255146</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:100%;height:100%;background:#000;overflow:hidden;cursor:none;font-family:'Courier New',monospace;color:#4a8a8a;}
  canvas{display:block;}
  #cursor{position:fixed;width:12px;height:12px;border-radius:50%;background:rgba(180,230,230,0.6);box-shadow:0 0 12px rgba(180,230,230,0.8);pointer-events:none;transform:translate(-50%,-50%);z-index:1000;transition:width 0.2s,height 0.2s,background 0.2s;}
  #cursor.hover{width:24px;height:24px;background:rgba(255,220,180,0.7);box-shadow:0 0 24px rgba(255,220,180,0.9);}
  canvas{background:transparent !important;}
  #start-overlay{position:fixed;inset:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding-bottom:12%;z-index:2000;cursor:pointer;}
  #start-overlay.fade{opacity:0;transition:opacity 3s ease;pointer-events:none;}
  #start-overlay .intro{color:rgba(180,210,210,0.55);font-size:13px;letter-spacing:0.18em;line-height:2.1;text-align:center;max-width:520px;margin-bottom:40px;animation:fi 4s ease-out forwards;}
  #start-overlay .world{color:rgba(100,160,160,0.4);font-size:11px;letter-spacing:0.5em;text-transform:lowercase;margin-bottom:48px;animation:fi 3s ease-out forwards;}
  #start-overlay .text{color:#4a8a8a;font-size:13px;letter-spacing:0.35em;text-transform:lowercase;opacity:0.5;animation:sp 3s ease-in-out infinite;}
  @keyframes sp{0%,100%{opacity:0.25;}50%{opacity:0.65;}}
  @keyframes fi{from{opacity:0;}to{opacity:1;}}
  #subtitle{position:fixed;bottom:12%;left:50%;transform:translateX(-50%);max-width:70%;text-align:center;color:rgba(180,230,230,0.95);font-size:20px;letter-spacing:0.06em;line-height:1.9;pointer-events:none;opacity:0;transition:opacity 1.5s ease;z-index:500;text-shadow:0 0 12px rgba(0,0,0,0.95);white-space:pre-line;}
  #subtitle.show{opacity:1;}
  /* Scene menu */
  #scene-menu{position:fixed;top:20px;left:20px;z-index:600;display:flex;flex-direction:column;gap:8px;}
  .scene-btn{background:none;border:none;color:rgba(74,138,138,0.35);font-family:'Courier New',monospace;font-size:14px;letter-spacing:0.3em;text-transform:lowercase;cursor:pointer;text-align:left;padding:4px 8px;transition:color 0.3s,opacity 0.3s;}
  .scene-btn:hover{color:rgba(180,230,230,0.7);}
  .scene-btn.active{color:rgba(180,230,230,0.8);border-left:2px solid rgba(180,230,230,0.5);padding-left:12px;}
  .scene-btn.locked{opacity:0.2;pointer-events:none;}

  #vignette{position:fixed;inset:0;pointer-events:none;background:radial-gradient(ellipse at center,transparent 30%,rgba(0,0,0,0.4) 70%,rgba(0,0,0,0.95) 100%);z-index:100;}
  #glitch{position:fixed;inset:0;pointer-events:none;z-index:200;}
  #glitch.active{animation:gf 0.6s steps(8);}
  @keyframes gf{0%{background:rgba(0,0,0,0);transform:translate(0,0);}12%{background:rgba(180,230,230,0.35);transform:translate(8px,-3px);filter:invert(0.3);}50%{background:rgba(255,80,80,0.18);transform:translate(-4px,-2px);}100%{background:rgba(0,0,0,0);transform:translate(0,0);filter:none;}}
  #dismiss-hint{position:fixed;bottom:3%;left:50%;transform:translateX(-50%);color:rgba(74,138,138,0.4);font-size:11px;letter-spacing:0.4em;pointer-events:none;z-index:600;opacity:0;transition:opacity 1s;}
  #dismiss-hint.show{opacity:1;}
  .pres-arrow{position:fixed;top:50%;transform:translateY(-50%);width:52px;height:52px;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:700;opacity:0;transition:opacity 0.4s;pointer-events:none;border:1px solid rgba(80,160,160,0.2);color:rgba(120,200,200,0.5);font-size:22px;font-family:'Courier New',monospace;background:rgba(0,0,0,0.3);user-select:none;}
  .pres-arrow.show{opacity:1;pointer-events:all;}
  .pres-arrow:hover{color:rgba(180,230,230,0.95);border-color:rgba(120,200,200,0.55);background:rgba(0,0,0,0.55);}
  #arr-next{right:18px;}
  #arr-prev{left:18px;}
  #pres-badge{display:none;position:fixed;top:15px;right:100px;color:#ff7755;font-size:11px;letter-spacing:0.25em;opacity:0.6;z-index:500;font-family:'Courier New',monospace;}
  #transition-overlay{position:fixed;inset:0;background:#000;pointer-events:none;opacity:0;z-index:800;transition:opacity 1.5s ease;}
  #transition-overlay.active{opacity:1;}
  /* Bottom-right settings */
  #set-toggle{position:fixed;bottom:20px;right:20px;z-index:1600;background:rgba(4,10,12,0.85);border:1px solid rgba(74,138,138,0.3);color:rgba(100,170,160,0.7);font-family:'Courier New',monospace;font-size:11px;letter-spacing:0.22em;padding:7px 13px;cursor:pointer;transition:all 0.2s;}
  #set-toggle:hover{color:rgba(180,230,230,0.95);border-color:rgba(120,200,190,0.55);}
  #set-panel{position:fixed;bottom:56px;right:20px;z-index:1500;background:rgba(3,8,10,0.95);border:1px solid rgba(60,110,100,0.3);padding:16px 18px;display:flex;flex-direction:column;gap:11px;width:210px;opacity:0;pointer-events:none;transform:translateY(6px);transition:opacity 0.25s,transform 0.25s;}
  #set-panel.open{opacity:1;pointer-events:all;transform:translateY(0);}
  .srow{display:flex;align-items:center;gap:10px;font-family:'Courier New',monospace;font-size:9px;letter-spacing:0.28em;color:rgba(74,138,138,0.65);}
  .srow span{min-width:18px;text-align:right;}
  .srow input[type=range]{-webkit-appearance:none;appearance:none;flex:1;height:1px;background:rgba(74,138,138,0.35);outline:none;cursor:pointer;}
  .srow input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:10px;height:10px;border-radius:50%;background:rgba(180,230,230,0.85);cursor:pointer;box-shadow:0 0 8px rgba(180,230,230,0.6);}
</style>

.sh-bunk::after{content:"";position:absolute;left:7%;bottom:-22%;width:86%;height:34%;background:linear-gradient(180deg,#111716,#050707);border-radius:0 0 14px 14px;border:1px solid rgba(200,220,190,.07);}
.sh-ladder{position:absolute;left:20vw;bottom:9vh;width:70px;height:42vh;border-left:5px solid rgba(110,125,112,.55);border-right:5px solid rgba(110,125,112,.55);opacity:.65;}
.sh-ladder span{position:absolute;left:-4px;width:68px;height:4px;background:rgba(110,125,112,.55);}
.sh-floor{position:absolute;left:0;right:0;bottom:0;height:20vh;background:repeating-linear-gradient(90deg,rgba(180,200,180,.08) 0,rgba(180,200,180,.08) 1px,transparent 1px,transparent 78px),linear-gradient(180deg,rgba(25,36,35,.2),#020404 65%);border-top:1px solid rgba(170,220,200,.08);transform:perspective(650px) rotateX(58deg);transform-origin:bottom center;}

.sh-cone{position:absolute;left:50%;top:11vh;transform:translateX(-50%);width:36vw;height:70vh;clip-path:polygon(42% 0,58% 0,100% 100%,0 100%);background:linear-gradient(180deg,rgba(120,190,170,.14),transparent 76%);filter:blur(8px);opacity:.58;animation:sh-breath 7s infinite ease-in-out;}
.sh-noise{position:absolute;inset:-20%;background-image:radial-gradient(circle,rgba(255,255,255,.13) 1px,transparent 1px);background-size:37px 37px;opacity:.05;animation:sh-drift 14s linear infinite;}

@keyframes sh-flicker{0%,8%,11%,100%{opacity:1;}9%{opacity:.35;}10%{opacity:.82;}53%{opacity:.7;}54%{opacity:1;}78%{opacity:.55;}79%{opacity:.95;}}
@keyframes sh-breath{0%,100%{opacity:.46;transform:translateX(-50%) scaleX(.94);}50%{opacity:.68;transform:translateX(-50%) scaleX(1.04);}}

</style>

<script>
let started=false,particles=[],hotspots=[],creatures=[],stationElements=[],fishSwarms=[],deepCreatures=[],stationBG=null;
let seaDevilImg=null;
let camDX=0,camDY=0,lastGlitch=0,lastInteract=0,idleWPlayed=false;
let glitchFX,whisperN,whisperF,whisperG,hoverPing;
let sceneBuses={},layerPlayers={},layerGains={},hotspotPlayers={},hotspotRev;
let activeViz=null,vizStart=0,vizAlpha=0,vizDismissing=false,vizDismissStart=0,activeVizQuote='';
let scene=0,sceneVisited=[0,0,0],sceneRequired=[3,4,2],scenesUnlocked=[true,true,true];
let bgBrt=0;
let ascendVisible=false,ascendX=0,ascendY=0,ascendHovered=false;
let transitioning=false,transitionStart=0,transitionBuilt=false,transitionTarget=0;
let eyeActive=false,eyeStart=0;
let hotspotPhase='idle'; // idle -> quote -> ready (click again for viz)
let activeHotspot=null;

const curEl=document.getElementById('cursor');
document.addEventListener('mousemove',e=>{curEl.style.left=e.clientX+'px';curEl.style.top=e.clientY+'px';if(typeof millis==='function'){lastInteract=millis();idleWPlayed=false;}});
document.getElementById('volume-slider').addEventListener('input',function(){if(Tone&&Tone.Destination)Tone.Destination.volume.value=parseFloat(this.value);});

function showSub(t,dur,col,sz){const s=document.getElementById('subtitle');s.style.color=col||'rgba(180,230,230,0.95)';s.style.fontSize=sz||'20px';s.textContent=t;s.classList.add('show');if(dur)setTimeout(()=>s.classList.remove('show'),dur);}
function hideSub(){document.getElementById('subtitle').classList.remove('show');}
function updateNavBtn(){
  const next=document.getElementById('arr-next'),prev=document.getElementById('arr-prev');
  if(activeViz&&!vizDismissing){next.classList.add('show');prev.classList.add('show');}
  else{next.classList.remove('show');prev.classList.remove('show');}
}
function navNext(){
  if(!started)return;
  if(activeViz&&!vizDismissing){dismissViz();return;}
}
function navPrev(){
  if(!started)return;
  if(activeViz&&!vizDismissing){dismissViz();return;}
}
function playHoverPing(){if(hoverPing)hoverPing.triggerAttackRelease("E6","16n");}
function triggerGlitch(){if(!glitchFX)return;glitchFX.wet.rampTo(0.85,0.02);setTimeout(()=>glitchFX.wet.rampTo(0,0.4),600);document.getElementById('glitch').classList.add('active');setTimeout(()=>document.getElementById('glitch').classList.remove('active'),600);}
function playWhisper(w){if(!whisperG)return;whisperG.gain.rampTo(0.06,0.5);setTimeout(()=>whisperG.gain.rampTo(0,1.5),1200);showSub(w,1800,'rgba(180,230,230,0.35)','14px');}
function dismissViz(){if(activeViz&&!vizDismissing){vizDismissing=true;vizDismissStart=millis();}}

// Scene navigation menu
function navScene(target){
  if(!scenesUnlocked[target]||transitioning||eyeActive||activeViz)return;
  if(target===scene)return;
  transitionTarget=target;
  transitioning=true;transitionStart=millis();transitionBuilt=false;
  document.getElementById('transition-overlay').classList.add('active');
}
function updateMenu(){
  const btns=document.querySelectorAll('.scene-btn');
  btns.forEach((b,i)=>{b.classList.toggle('active',i===scene);b.classList.toggle('locked',!scenesUnlocked[i]);});
}
// ===================== AUDIO (MP3 SAMPLES) =====================
function initAudio(){
  Tone.Destination.volume.value=parseFloat(document.getElementById('volume-slider').value);
  // Glitch FX — routes all scene audio, activated briefly during glitch events
  glitchFX=new Tone.BitCrusher(8).toDestination();glitchFX.wet.value=0;
  // Hover ping (synthetic — tiny UI blip)
  hoverPing=new Tone.Synth({oscillator:{type:"sine"},envelope:{attack:0.005,decay:0.2,sustain:0,release:0.2}}).toDestination();hoverPing.volume.value=-20;
  // Whisper (synthetic — idle effect)
  whisperN=new Tone.Noise("white").start();whisperF=new Tone.Filter({frequency:800,type:"bandpass",Q:8});whisperG=new Tone.Gain(0).toDestination();
  whisperN.connect(whisperF);whisperF.connect(whisperG);new Tone.LFO(2,400,1600).start().connect(whisperF.frequency);
  // Shared reverb for hotspot one-shots
  hotspotRev=new Tone.Reverb({decay:4,wet:0.4}).connect(glitchFX);
  // === SCENE LAYERS (looped MP3s) ===
  const sceneDef={
    world:[
      {file:'underwater-base.mp3',    vol:0.70},
      {file:'underwater-ambience-lake.mp3', vol:0.93},
      {file:'humpback-whale.mp3',     vol:0.23},
      {file:'abyss.mp3',             vol:0.50}
    ],
    station:[
      {file:'spaceship-ambience.mp3', vol:0.60},
      {file:'factory-ambience.mp3',   vol:0.35},
      {file:'machine-cycle.mp3',      vol:0.30},
      {file:'metal-creak-long.mp3',   vol:0.50}
    ],
    eye:[
      {file:'drone-filter.mp3',       vol:0.40},
      {file:'underwater-choir.mp3',   vol:0.13}
    ]
  };
  // Create a gain bus per scene, routed through glitchFX
  ['world','station','eye'].forEach((name,idx)=>{
    const bus=new Tone.Gain(idx===0?1:0).connect(glitchFX);
    sceneBuses[name]=bus;
    layerPlayers[name]=[];
    layerGains[name]=[];
    sceneDef[name].forEach(layer=>{
      const gain=new Tone.Gain(layer.vol).connect(bus);
      const player=new Tone.Player({url:layer.file,loop:true,fadeIn:2,fadeOut:2}).connect(gain);
      layerPlayers[name].push(player);
      layerGains[name].push(gain);
    });
  });
  // === HOTSPOT TRIGGERS (one-shot MP3s) ===
  const hsDef={
    shrinking_belt:'metal-creak-short.mp3',
    deep_parade:'whale-song.mp3',
    sea_level:'abyss.mp3',
    hierarchy:'industrial-spire.mp3',
    daily_life:'metal-clanking.mp3',
    air_oxygen:'valve-relief.mp3',
    the_mothers:'pump-release.mp3',
    mythology:'whale-low.mp3',
    selection:'whale-fx1.mp3'
  };
  for(const[vizId,file] of Object.entries(hsDef)){
    hotspotPlayers[vizId]=new Tone.Player({url:file,loop:false,fadeOut:0.5}).connect(hotspotRev);
  }
  // Start all looping layers once buffers are loaded
  Tone.loaded().then(()=>{
    ['world','station','eye'].forEach(name=>{
      layerPlayers[name].forEach(p=>{try{p.start();}catch(e){console.warn('start failed:',e);}});
    });
  }).catch(err=>console.error('Audio load error:',err));
}
// Crossfade scene buses on scene change
function updateSceneAudio(){
  const map=['world','station','eye'];
  const target=map[scene];
  map.forEach(name=>{
    const bus=sceneBuses[name];
    if(!bus)return;
    bus.gain.rampTo(name===target?1:0,2);
  });
}

class Creature{
  constructor(){this.type=Math.floor(random(4));this.dead=false;this.age=0;this.state='approaching';this.touchT=0;this.fleeAng=0;
    const e=Math.floor(random(4));if(e===0){this.x=random(width);this.y=-80;}else if(e===1){this.x=random(width);this.y=height+80;}
    else if(e===2){this.x=-80;this.y=random(height);}else{this.x=width+80;this.y=random(height);}
    this.speed=random(6,12);this.fleeSpd=random(14,22);this.rot=0;this.noiseO=random(10000);this.sc=random(1.6,2.8);this.trailPts=[];this.swarmPts=[];
    if(this.type===1)for(let i=0;i<80;i++)this.swarmPts.push({ox:random(-40,40),oy:random(-40,40),s:random(1.5,4)});}
  update(){this.age++;const mx=mouseX-camDX,my=mouseY-camDY;
    if(this.state==='approaching'){const dx=mx-this.x,dy=my-this.y,d=Math.sqrt(dx*dx+dy*dy);this.rot=atan2(dy,dx);
      if(d>20){this.x+=cos(this.rot+sin(frameCount*0.07+this.noiseO)*0.4)*this.speed;this.y+=sin(this.rot)*this.speed;}else{this.state='touching';this.touchT=millis();}}
    else if(this.state==='touching'){this.x=mx+cos(frameCount*0.1)*15;this.y=my+sin(frameCount*0.1)*15;if(millis()-this.touchT>1000){this.state='fleeing';this.fleeAng=atan2(this.y-my,this.x-mx)+random(-0.3,0.3);}}
    else{this.x+=cos(this.fleeAng)*this.fleeSpd;this.y+=sin(this.fleeAng)*this.fleeSpd;if(this.x<-200||this.x>width+200||this.y<-200||this.y>height+200)this.dead=true;}
    if(this.age%2===0)this.trailPts.push({x:this.x,y:this.y,a:200});for(let t of this.trailPts)t.a-=3;this.trailPts=this.trailPts.filter(t=>t.a>0);return !this.dead;}
  display(){const fi=min(this.age/12,1),th=this.state==='touching'?sin(frameCount*0.15)*0.5+0.5:0,a=fi*255;
    for(let t of this.trailPts){fill(8,15,25,t.a*0.4*fi);noStroke();circle(t.x,t.y,random(12,35)*this.sc*0.5);}
    push();translate(this.x,this.y);rotate(this.rot);scale(this.sc);noStroke();
    if(this.type===0){for(let i=0;i<10;i++){fill(3+th*50,6,10+th*15,a*(0.5-i*0.04));ellipse(sin(frameCount*0.03+i*1.1)*18,cos(frameCount*0.025+i*0.9)*14,40+i*6,32+i*5);}fill(220+th*35,70+th*100,35,a*0.95);circle(10,-7,6);circle(10,7,6);}
    else if(this.type===1){for(let p of this.swarmPts){fill(25+th*120,35+th*50,45,a*0.7);circle(p.ox+sin(frameCount*0.06+p.ox)*10,p.oy+cos(frameCount*0.05+p.oy)*10,p.s);}}
    else if(this.type===2){fill(3,5,8,a*0.7);ellipse(0,0,90,65);fill(160+th*80,85+th*70,25,a*0.95);ellipse(10,0,26,28);fill(0,0,0,a);ellipse(13,0,13,17);fill(255,255,200,a*0.7);circle(16,-5,4);}
    else{if(frameCount%6<2){pop();return;}stroke(50+th*140,200,200,a*0.7);strokeWeight(1.5);noFill();const r=30+sin(frameCount*0.1)*10;beginShape();for(let i=0;i<=5;i++){const ang=i*TWO_PI/5+frameCount*0.02;vertex(cos(ang)*(r+((frameCount+i*37)%9<3?random(-14,14):0)),sin(ang)*(r+((frameCount+i*37)%9<3?random(-14,14):0)));}endShape(CLOSE);noStroke();fill(220,255,200,a*0.6);circle(0,0,5);}
    pop();}
}

class FishSwarm{
  constructor(opts={}){
    this.stationary=opts.stationary||false;
    this.dir=opts.dir||(random()>0.5?1:-1);
    if(this.stationary){
      this.cx=opts.x||random(width*0.2,width*0.8);
      this.cy=opts.y||random(height*0.2,height*0.8);
      this.vx=0;this.vy=0;
    }else{
      this.cx=this.dir>0?random(-400,-100):random(width+100,width+400);
      this.cy=random(height*0.15,height*0.85);
      this.vx=random(0.2,0.5)*this.dir;this.vy=random(-0.03,0.03);
    }
    this.wobbleOff=random(1000);
    this.count=opts.count||19;this.baseScale=opts.scale||0.1;this.opacity=opts.opacity||80;
    this.fish=[];const rad=opts.radius||random(100,160);
    for(let i=0;i<this.count;i++){const ang=random(TWO_PI);const d=sqrt(random())*rad;
      this.fish.push({ox:cos(ang)*d,oy:sin(ang)*d*0.65,sc:random(0.3,1.0),rotOff:random(-0.12,0.12),ws:random(0.008,0.025),wa:random(3,8),wo:random(TWO_PI)});}
  }
  update(){
    if(this.stationary){this.cx+=sin(frameCount*0.002+this.wobbleOff)*0.3;this.cy+=cos(frameCount*0.0015+this.wobbleOff)*0.2;return;}
    this.cx+=this.vx;this.cy+=this.vy+sin(frameCount*0.004+this.wobbleOff)*0.12;
    if(this.dir>0&&this.cx>width+500){this.cx=-500;this.cy=random(height*0.15,height*0.85);}
    if(this.dir<0&&this.cx<-500){this.cx=width+500;this.cy=random(height*0.15,height*0.85);}
  }
  display(){for(let f of this.fish){
    const fx=this.cx+f.ox+sin(frameCount*f.ws+f.wo)*f.wa;
    const fy=this.cy+f.oy+cos(frameCount*f.ws*0.7+f.wo)*f.wa*0.4;
    push();translate(fx,fy);if(this.dir<0)scale(-1,1);rotate(f.rotOff);scale(f.sc*this.baseScale);
    fill(141,165,199,this.opacity);noStroke();beginShape();for(let pt of FISH_SHAPE)vertex(pt[0],pt[1]);endShape(CLOSE);pop();
  }}
}

function drawEyeBackground(){
  const cx=width/2,cy=height*0.35;
  // Beam from above — layered for soft edges
  noStroke();
  for(let i=12;i>=0;i--){
    const w=8+i*12,a=2+i*0.6;
    fill(200,185,120,a);rect(cx-w/2,0,w,height);
  }
  // Brighter core
  for(let i=0;i<4;i++){fill(230,215,160,6-i);rect(cx-4-i*2,0,8+i*4,height);}

  // Light source glow at top
  fill(220,200,140,8);circle(cx,0,300);fill(230,210,150,14);circle(cx,0,150);fill(240,220,160,22);circle(cx,0,60);

  // Floor glow where beam hits
  fill(200,180,120,6);ellipse(cx,height*0.88,200,30);fill(220,200,140,10);ellipse(cx,height*0.88,100,15);

  // Altar rings
  for(let el of eyeElements)if(el.type==='ring'){
    const pulse=sin(frameCount*el.pulse+el.off)*0.3+0.7;
    stroke(180,165,110,12*pulse);strokeWeight(0.5);noFill();
    ellipse(cx,height*0.88,el.r*2,el.r*0.4);
  }

  // Dust in beam
  for(let el of eyeElements)if(el.type==='dust'){
    const dx=sin(frameCount*0.005+el.off)*el.drift*40;
    const dy=(el.y+frameCount*el.speed)%height;
    // Only visible inside beam width
    const distFromCenter=abs(cx+dx-cx+el.x-cx);
    const beamW=70;
    if(distFromCenter<beamW){
      const inBeam=1-distFromCenter/beamW;
      fill(220,210,170,35*inBeam*el.bright);noStroke();
      circle(el.x+dx,dy,el.size);
    }
  }

  // Rising embers
  for(let el of eyeElements)if(el.type==='ember'){
    const dx=sin(frameCount*0.004+el.off)*el.drift*25;
    const dy=(el.y-frameCount*el.speed+el.off*3)%height;
    const realY=dy<0?dy+height:dy;
    noStroke();
    if(el.col==='warm'){fill(200,150,60,25);circle(el.x+dx,realY,el.size);fill(220,170,70,10);circle(el.x+dx,realY,el.size*3);}
    else{fill(140,170,190,18);circle(el.x+dx,realY,el.size);fill(120,150,170,8);circle(el.x+dx,realY,el.size*3);}
  }

  // Subtle vignette
  const ctx=drawingContext;ctx.save();
  const g=ctx.createRadialGradient(cx,height*0.4,min(width,height)*0.1,cx,height*0.4,max(width,height)*0.6);
  g.addColorStop(0,'rgba(0,0,0,0)');g.addColorStop(0.5,'rgba(0,0,0,0.3)');
  g.addColorStop(0.8,'rgba(0,0,0,0.7)');g.addColorStop(1,'rgba(0,0,0,0.92)');
  ctx.fillStyle=g;ctx.fillRect(0,0,width,height);ctx.restore();
}

function drawVisualization(){
  if(!activeViz)return;
  const el=millis()-vizStart;

  // Text alpha: fade in immediately (0→0.8s)
  const textA=vizDismissing?map(millis()-vizDismissStart,0,600,1,0):min(el/800,1);
  // Viz alpha: fade in after 0.5s (0.5→1.5s)
  const rawVizA=vizDismissing?map(millis()-vizDismissStart,0,600,1,0):min(max(el-500,0)/1000,1);
  vizAlpha=rawVizA*230;

  if(vizDismissing&&millis()-vizDismissStart>700){
    activeViz=null;vizDismissing=false;vizAlpha=0;
    document.getElementById('dismiss-hint').classList.remove('show');
    hotspotPhase='idle';updateNavBtn();return;
  }

  const VZ=0.76,splitY=height*VZ;

  // Dark overlay — fades in with text
  push();fill(0,0,5,textA*190);noStroke();rect(0,0,width,height);pop();

  // Viz — shifted up slightly so bottom fits in clip zone, no scaling (keeps text/shapes full size)
  if(rawVizA>0){
    drawingContext.save();drawingContext.beginPath();drawingContext.rect(0,-height*0.08,width,splitY+height*0.08);drawingContext.clip();
    push();translate(0,-height*0.07);
    const v=activeViz;
    if(v==='shrinking_belt')drawVizBelt(vizAlpha);else if(v==='deep_parade')drawVizParade(vizAlpha);else if(v==='sea_level')drawVizSea(vizAlpha);
    else if(v==='hierarchy')drawVizHierarchy(vizAlpha);else if(v==='daily_life')drawVizDaily(vizAlpha);
    else if(v==='air_oxygen')drawVizAir(vizAlpha);else if(v==='number39')drawVizN39(vizAlpha);else if(v==='the_mothers')drawVizMothers(vizAlpha);
    else if(v==='mythology')drawVizMyth(vizAlpha);else if(v==='selection')drawVizSelection(vizAlpha);
    pop();drawingContext.restore();
  }

  // Divider
  push();stroke(80,140,140,textA*45);strokeWeight(0.5);line(width*0.1,splitY,width*0.9,splitY);pop();

  // Quote text — same size as subtitle, stays in bottom zone
  if(activeVizQuote&&textA>0){
    push();noStroke();textAlign(CENTER);
    const lines=activeVizQuote.split('\n');
    const lh=26,totalH=lines.length*lh;
    const zoneH=height-splitY,textY=splitY+zoneH/2-totalH/2+lh*0.5;
    lines.forEach((ln,i)=>{
      fill(170,215,205,textA*210);textSize(17);text(ln,width/2,textY+i*lh);
    });
    pop();
  }
}

function mollweide(lat,lon,cx,cy,rw,rh){
  const phi=lat*PI/180,lam=lon*PI/180;
  let th=phi;for(let i=0;i<10;i++){const d=(2*th+sin(2*th)-PI*sin(phi))/(2+2*cos(2*th));th-=d;if(abs(d)<0.001)break;}
  return{x:cx+(2*sqrt(2)/PI)*lam*cos(th)*rw*0.45,y:cy-sqrt(2)*sin(th)*rh*0.45};
}

function clearPresState(){
  if(activeViz){activeViz=null;vizDismissing=false;vizAlpha=0;}
  hideSub();hotspotPhase='idle';activeHotspot=null;eyeActive=false;
  document.getElementById('dismiss-hint').classList.remove('show');
}

function goToStep(idx){
  if(idx<0||idx>=PRES_STEPS.length)return;
  clearPresState();
  presStep=idx;
  const step=PRES_STEPS[idx];

  // Ensure correct scene (instant switch if needed)
  if(step.scene!==undefined&&step.scene!==scene){
    scene=step.scene;buildScene(scene);updateSceneAudio();updateMenu();
  }

  if(step.type==='text'){
    showSub(step.text);
  }
  else if(step.type==='quote'){
    const h=hotspots[step.idx];if(!h)return;
    h.lastAct=0;if(!h.visited){h.visited=true;sceneVisited[scene]++;}
    hotspotPhase='quote';activeHotspot=h;
    showSub(h.quote);
    const hp=hotspotPlayers[h.vizId];if(hp){try{hp.stop();hp.start();}catch(e){}}
    if(scene===0)creatures.push(new Creature());
  }
  else if(step.type==='viz'){
    const h=hotspots[step.idx];if(!h)return;
    hotspotPhase='viz';activeHotspot=h;
    activeViz=h.vizId;
    vizStart=millis()-4000; // skip 3.5s fade delay — show immediately
    vizDismissing=false;
  }
  else if(step.type==='transition'){
    showSub(step.text);
    startTransition(step.target);
  }
  else if(step.type==='climax'){
    eyeActive=true;eyeStart=millis();ascendVisible=false;
  }
  updatePresUI();
}

function presNext(){if(presStep<PRES_STEPS.length-1)goToStep(presStep+1);}
function presBack(){if(presStep>0)goToStep(presStep-1);}

function togglePres(){
  if(presMode){
    presMode=false;clearPresState();presStep=-1;
    document.getElementById('pres-badge').style.display='none';
    return;
  }
  presMode=true;
  document.getElementById('pres-badge').style.display='block';
  if(!started){
    Tone.start().then(()=>{initAudio();
      document.getElementById('start-overlay').classList.add('fade');
      setTimeout(()=>{document.getElementById('start-overlay').style.display='none';started=true;
        buildScene(0);goToStep(0);},2000);
    });
  }else{
    buildScene(0);goToStep(0);
  }
}

function updatePresUI(){
  const badge=document.getElementById('pres-badge');
  if(!presMode){badge.style.display='none';return;}
  const step=PRES_STEPS[presStep];
  badge.style.display='block';
  badge.textContent='\u25C0 '+(presStep+1)+'/'+PRES_STEPS.length+' \u25B6  '+step.label;
}

document.addEventListener('keydown',e=>{
  if((e.key==='p'||e.key==='P')&&!e.ctrlKey&&!e.metaKey){e.preventDefault();togglePres();return;}
  if(!presMode){
    if(e.key==='ArrowRight'){e.preventDefault();navNext();}
    else if(e.key==='ArrowLeft'){e.preventDefault();navPrev();}
    return;
  }
  if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();presNext();}
  else if(e.key==='ArrowLeft'){e.preventDefault();presBack();}
  else if(e.key==='Escape'){e.preventDefault();togglePres();}
});
</script></body></html>
