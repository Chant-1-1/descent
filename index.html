<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DESCENT — World 3324255146</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:100%;height:100%;background:#000;overflow:hidden;cursor:none;font-family:'Courier New',monospace;color:#4a8a8a;}
  canvas{display:block;}
  #cursor{position:fixed;width:12px;height:12px;border-radius:50%;background:rgba(180,230,230,0.6);box-shadow:0 0 12px rgba(180,230,230,0.8);pointer-events:none;transform:translate(-50%,-50%);z-index:1000;transition:width 0.2s,height 0.2s,background 0.2s;}
  #cursor.hover{width:24px;height:24px;background:rgba(255,220,180,0.7);box-shadow:0 0 24px rgba(255,220,180,0.9);}
  #start-overlay{position:fixed;inset:0;background:#000;display:flex;align-items:center;justify-content:center;z-index:2000;cursor:pointer;}
  #start-overlay.fade{opacity:0;transition:opacity 3s ease;pointer-events:none;}
  #start-overlay .text{color:#4a8a8a;font-size:14px;letter-spacing:0.3em;text-transform:lowercase;opacity:0.6;animation:sp 3s ease-in-out infinite;}
  @keyframes sp{0%,100%{opacity:0.3;}50%{opacity:0.7;}}
  #subtitle{position:fixed;bottom:12%;left:50%;transform:translateX(-50%);max-width:70%;text-align:center;color:rgba(180,230,230,0.95);font-size:20px;letter-spacing:0.06em;line-height:1.9;pointer-events:none;opacity:0;transition:opacity 1.5s ease;z-index:500;text-shadow:0 0 12px rgba(0,0,0,0.95);white-space:pre-line;}
  #subtitle.show{opacity:1;}
  /* Scene menu */
  #scene-menu{position:fixed;top:20px;left:20px;z-index:600;display:flex;flex-direction:column;gap:8px;}
  .scene-btn{background:none;border:none;color:rgba(74,138,138,0.35);font-family:'Courier New',monospace;font-size:14px;letter-spacing:0.3em;text-transform:lowercase;cursor:pointer;text-align:left;padding:4px 8px;transition:color 0.3s,opacity 0.3s;}
  .scene-btn:hover{color:rgba(180,230,230,0.7);}
  .scene-btn.active{color:rgba(180,230,230,0.8);border-left:2px solid rgba(180,230,230,0.5);padding-left:12px;}
  .scene-btn.locked{opacity:0.2;pointer-events:none;}
  #volume-control{position:fixed;top:20px;right:24px;display:flex;align-items:center;gap:12px;z-index:1500;font-size:11px;letter-spacing:0.4em;color:rgba(74,138,138,0.5);cursor:auto;}
  #volume-control input[type=range]{-webkit-appearance:none;appearance:none;width:140px;height:1px;background:rgba(74,138,138,0.35);outline:none;cursor:pointer;}
  #volume-control input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:10px;height:10px;border-radius:50%;background:rgba(180,230,230,0.85);cursor:pointer;box-shadow:0 0 10px rgba(180,230,230,0.7);border:none;}
  #vignette{position:fixed;inset:0;pointer-events:none;background:radial-gradient(ellipse at center,transparent 30%,rgba(0,0,0,0.4) 70%,rgba(0,0,0,0.95) 100%);z-index:100;}
  #glitch{position:fixed;inset:0;pointer-events:none;z-index:200;}
  #glitch.active{animation:gf 0.6s steps(8);}
  @keyframes gf{0%{background:rgba(0,0,0,0);transform:translate(0,0);}12%{background:rgba(180,230,230,0.35);transform:translate(8px,-3px);filter:invert(0.3);}50%{background:rgba(255,80,80,0.18);transform:translate(-4px,-2px);}100%{background:rgba(0,0,0,0);transform:translate(0,0);filter:none;}}
  #dismiss-hint{position:fixed;bottom:3%;left:50%;transform:translateX(-50%);color:rgba(74,138,138,0.4);font-size:11px;letter-spacing:0.4em;pointer-events:none;z-index:600;opacity:0;transition:opacity 1s;}
  #dismiss-hint.show{opacity:1;}
  #transition-overlay{position:fixed;inset:0;background:#000;pointer-events:none;opacity:0;z-index:800;transition:opacity 1.5s ease;}
  #transition-overlay.active{opacity:1;}
</style>
</head>
<body>
<div id="start-overlay"><div class="text">click to descend · use headphones</div></div>
<div id="cursor"></div><div id="vignette"></div><div id="glitch"></div><div id="transition-overlay"></div>
<div id="scene-menu">
  <button class="scene-btn active" onclick="navScene(0)">i · the world</button>
  <button class="scene-btn" onclick="navScene(1)">ii · the station</button>
  <button class="scene-btn" onclick="navScene(2)">iii · the eye</button>
</div>
<div id="volume-control"><span>vol</span><input type="range" id="volume-slider" min="-20" max="20" value="6" step="1"></div>
<div id="subtitle"></div><div id="dismiss-hint">click to return</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
<script>
let started=false,particles=[],hotspots=[],creatures=[],stationElements=[],fishSwarms=[];
let camDX=0,camDY=0,lastGlitch=0,lastInteract=0,idleWPlayed=false;
let glitchFX,whisperN,whisperF,whisperG,hoverPing;
let sceneBuses={},layerPlayers={},layerGains={},hotspotPlayers={},hotspotRev;
let activeViz=null,vizStart=0,vizAlpha=0,vizDismissing=false,vizDismissStart=0;
let scene=0,sceneVisited=[0,0,0],sceneRequired=[3,4,2],scenesUnlocked=[true,true,true];
let ascendVisible=false,ascendX=0,ascendY=0,ascendHovered=false;
let transitioning=false,transitionStart=0,transitionBuilt=false,transitionTarget=0;
let eyeActive=false,eyeStart=0;
let hotspotPhase='idle'; // idle -> quote -> ready (click again for viz)
let activeHotspot=null;

const curEl=document.getElementById('cursor');
document.addEventListener('mousemove',e=>{curEl.style.left=e.clientX+'px';curEl.style.top=e.clientY+'px';if(typeof millis==='function'){lastInteract=millis();idleWPlayed=false;}});
document.getElementById('volume-slider').addEventListener('input',function(){if(Tone&&Tone.Destination)Tone.Destination.volume.value=parseFloat(this.value);});

function showSub(t,dur,col,sz){const s=document.getElementById('subtitle');s.style.color=col||'rgba(180,230,230,0.95)';s.style.fontSize=sz||'20px';s.textContent=t;s.classList.add('show');if(dur)setTimeout(()=>s.classList.remove('show'),dur);}
function hideSub(){document.getElementById('subtitle').classList.remove('show');}
function playHoverPing(){if(hoverPing)hoverPing.triggerAttackRelease("E6","16n");}
function triggerGlitch(){if(!glitchFX)return;glitchFX.wet.rampTo(0.85,0.02);setTimeout(()=>glitchFX.wet.rampTo(0,0.4),600);document.getElementById('glitch').classList.add('active');setTimeout(()=>document.getElementById('glitch').classList.remove('active'),600);}
function playWhisper(w){if(!whisperG)return;whisperG.gain.rampTo(0.06,0.5);setTimeout(()=>whisperG.gain.rampTo(0,1.5),1200);showSub(w,1800,'rgba(180,230,230,0.35)','14px');}
function dismissViz(){if(activeViz&&!vizDismissing){vizDismissing=true;vizDismissStart=millis();}}

// Scene navigation menu
function navScene(target){
  if(!scenesUnlocked[target]||transitioning||eyeActive||activeViz)return;
  if(target===scene)return;
  transitionTarget=target;
  transitioning=true;transitionStart=millis();transitionBuilt=false;
  document.getElementById('transition-overlay').classList.add('active');
}
function updateMenu(){
  const btns=document.querySelectorAll('.scene-btn');
  btns.forEach((b,i)=>{b.classList.toggle('active',i===scene);b.classList.toggle('locked',!scenesUnlocked[i]);});
}
// ===================== AUDIO (MP3 SAMPLES) =====================
function initAudio(){
  Tone.Destination.volume.value=parseFloat(document.getElementById('volume-slider').value);
  // Glitch FX — routes all scene audio, activated briefly during glitch events
  glitchFX=new Tone.BitCrusher(8).toDestination();glitchFX.wet.value=0;
  // Hover ping (synthetic — tiny UI blip)
  hoverPing=new Tone.Synth({oscillator:{type:"sine"},envelope:{attack:0.005,decay:0.2,sustain:0,release:0.2}}).toDestination();hoverPing.volume.value=-20;
  // Whisper (synthetic — idle effect)
  whisperN=new Tone.Noise("white").start();whisperF=new Tone.Filter({frequency:800,type:"bandpass",Q:8});whisperG=new Tone.Gain(0).toDestination();
  whisperN.connect(whisperF);whisperF.connect(whisperG);new Tone.LFO(2,400,1600).start().connect(whisperF.frequency);
  // Shared reverb for hotspot one-shots
  hotspotRev=new Tone.Reverb({decay:4,wet:0.4}).connect(glitchFX);
  // === SCENE LAYERS (looped MP3s) ===
  const sceneDef={
    world:[
      {file:'underwater-base.mp3',    vol:0.70},
      {file:'underwater-ambience-lake.mp3', vol:0.93},
      {file:'humpback-whale.mp3',     vol:0.23},
      {file:'abyss.mp3',             vol:0.50}
    ],
    station:[
      {file:'spaceship-ambience.mp3', vol:0.60},
      {file:'factory-ambience.mp3',   vol:0.35},
      {file:'machine-cycle.mp3',      vol:0.30},
      {file:'metal-creak-long.mp3',   vol:0.50}
    ],
    eye:[
      {file:'drone-filter.mp3',       vol:0.40},
      {file:'underwater-choir.mp3',   vol:0.13}
    ]
  };
  // Create a gain bus per scene, routed through glitchFX
  ['world','station','eye'].forEach((name,idx)=>{
    const bus=new Tone.Gain(idx===0?1:0).connect(glitchFX);
    sceneBuses[name]=bus;
    layerPlayers[name]=[];
    layerGains[name]=[];
    sceneDef[name].forEach(layer=>{
      const gain=new Tone.Gain(layer.vol).connect(bus);
      const player=new Tone.Player({url:layer.file,loop:true,fadeIn:2,fadeOut:2}).connect(gain);
      layerPlayers[name].push(player);
      layerGains[name].push(gain);
    });
  });
  // === HOTSPOT TRIGGERS (one-shot MP3s) ===
  const hsDef={
    shrinking_belt:'metal-creak-short.mp3',
    deep_parade:'whale-song.mp3',
    sea_level:'abyss.mp3',
    hierarchy:'industrial-spire.mp3',
    daily_life:'metal-clanking.mp3',
    air_oxygen:'valve-relief.mp3',
    number39:'pump-release.mp3',
    mythology:'whale-low.mp3',
    selection:'whale-fx1.mp3'
  };
  for(const[vizId,file] of Object.entries(hsDef)){
    hotspotPlayers[vizId]=new Tone.Player({url:file,loop:false,fadeOut:0.5}).connect(hotspotRev);
  }
  // Start all looping layers once buffers are loaded
  Tone.loaded().then(()=>{
    ['world','station','eye'].forEach(name=>{
      layerPlayers[name].forEach(p=>{try{p.start();}catch(e){console.warn('start failed:',e);}});
    });
  }).catch(err=>console.error('Audio load error:',err));
}
// Crossfade scene buses on scene change
function updateSceneAudio(){
  const map=['world','station','eye'];
  const target=map[scene];
  map.forEach(name=>{
    const bus=sceneBuses[name];
    if(!bus)return;
    bus.gain.rampTo(name===target?1:0,2);
  });
}
// ===================== CREATURES =====================
class Creature{
  constructor(){this.type=Math.floor(random(4));this.dead=false;this.age=0;this.state='approaching';this.touchT=0;this.fleeAng=0;
    const e=Math.floor(random(4));if(e===0){this.x=random(width);this.y=-80;}else if(e===1){this.x=random(width);this.y=height+80;}
    else if(e===2){this.x=-80;this.y=random(height);}else{this.x=width+80;this.y=random(height);}
    this.speed=random(6,12);this.fleeSpd=random(14,22);this.rot=0;this.noiseO=random(10000);this.sc=random(1.6,2.8);this.trailPts=[];this.swarmPts=[];
    if(this.type===1)for(let i=0;i<80;i++)this.swarmPts.push({ox:random(-40,40),oy:random(-40,40),s:random(1.5,4)});}
  update(){this.age++;const mx=mouseX-camDX,my=mouseY-camDY;
    if(this.state==='approaching'){const dx=mx-this.x,dy=my-this.y,d=Math.sqrt(dx*dx+dy*dy);this.rot=atan2(dy,dx);
      if(d>20){this.x+=cos(this.rot+sin(frameCount*0.07+this.noiseO)*0.4)*this.speed;this.y+=sin(this.rot)*this.speed;}else{this.state='touching';this.touchT=millis();}}
    else if(this.state==='touching'){this.x=mx+cos(frameCount*0.1)*15;this.y=my+sin(frameCount*0.1)*15;if(millis()-this.touchT>1000){this.state='fleeing';this.fleeAng=atan2(this.y-my,this.x-mx)+random(-0.3,0.3);}}
    else{this.x+=cos(this.fleeAng)*this.fleeSpd;this.y+=sin(this.fleeAng)*this.fleeSpd;if(this.x<-200||this.x>width+200||this.y<-200||this.y>height+200)this.dead=true;}
    if(this.age%2===0)this.trailPts.push({x:this.x,y:this.y,a:200});for(let t of this.trailPts)t.a-=3;this.trailPts=this.trailPts.filter(t=>t.a>0);return !this.dead;}
  display(){const fi=min(this.age/12,1),th=this.state==='touching'?sin(frameCount*0.15)*0.5+0.5:0,a=fi*255;
    for(let t of this.trailPts){fill(8,15,25,t.a*0.4*fi);noStroke();circle(t.x,t.y,random(12,35)*this.sc*0.5);}
    push();translate(this.x,this.y);rotate(this.rot);scale(this.sc);noStroke();
    if(this.type===0){for(let i=0;i<10;i++){fill(3+th*50,6,10+th*15,a*(0.5-i*0.04));ellipse(sin(frameCount*0.03+i*1.1)*18,cos(frameCount*0.025+i*0.9)*14,40+i*6,32+i*5);}fill(220+th*35,70+th*100,35,a*0.95);circle(10,-7,6);circle(10,7,6);}
    else if(this.type===1){for(let p of this.swarmPts){fill(25+th*120,35+th*50,45,a*0.7);circle(p.ox+sin(frameCount*0.06+p.ox)*10,p.oy+cos(frameCount*0.05+p.oy)*10,p.s);}}
    else if(this.type===2){fill(3,5,8,a*0.7);ellipse(0,0,90,65);fill(160+th*80,85+th*70,25,a*0.95);ellipse(10,0,26,28);fill(0,0,0,a);ellipse(13,0,13,17);fill(255,255,200,a*0.7);circle(16,-5,4);}
    else{if(frameCount%6<2){pop();return;}stroke(50+th*140,200,200,a*0.7);strokeWeight(1.5);noFill();const r=30+sin(frameCount*0.1)*10;beginShape();for(let i=0;i<=5;i++){const ang=i*TWO_PI/5+frameCount*0.02;vertex(cos(ang)*(r+((frameCount+i*37)%9<3?random(-14,14):0)),sin(ang)*(r+((frameCount+i*37)%9<3?random(-14,14):0)));}endShape(CLOSE);noStroke();fill(220,255,200,a*0.6);circle(0,0,5);}
    pop();}
}
// ===================== FISH SWARMS =====================
class FishSwarm{
  constructor(){
    // Swarm drifts across screen
    this.dir=random()>0.5?1:-1;
    this.cx=this.dir>0?random(-400,-100):random(width+100,width+400);
    this.cy=random(height*0.15,height*0.85);
    this.vx=random(0.3,0.7)*this.dir;
    this.vy=random(-0.05,0.05);
    this.wobbleOff=random(1000);
    // Fish shape from designer (centered points)
    this.shape=[[34,-40],[91,-24],[92,24],[22,32],[-35,14],[-89,38],[-81,-33],[-36,-10]];
    // 19 fish distributed in circle (r≈232 scaled to screen)
    this.fish=[];
    const rad=random(140,200);
    for(let i=0;i<19;i++){
      const ang=random(TWO_PI);
      const d=sqrt(random())*rad;
      this.fish.push({
        ox:cos(ang)*d, oy:sin(ang)*d*0.65,
        sc:random(0.3,1.0),
        rotOff:random(-0.12,0.12),
        ws:random(0.008,0.025), wa:random(3,8), wo:random(TWO_PI)
      });
    }
  }
  update(){
    this.cx+=this.vx;this.cy+=this.vy+sin(frameCount*0.004+this.wobbleOff)*0.15;
    // Wrap around when fully off-screen
    if(this.dir>0&&this.cx>width+500){this.cx=-500;this.cy=random(height*0.15,height*0.85);}
    if(this.dir<0&&this.cx<-500){this.cx=width+500;this.cy=random(height*0.15,height*0.85);}
  }
  display(){
    const baseScale=0.2;
    for(let f of this.fish){
      const fx=this.cx+f.ox+sin(frameCount*f.ws+f.wo)*f.wa;
      const fy=this.cy+f.oy+cos(frameCount*f.ws*0.7+f.wo)*f.wa*0.4;
      const sc=f.sc*baseScale;
      push();
      translate(fx,fy);
      if(this.dir<0)scale(-1,1);
      rotate(f.rotOff);
      scale(sc);
      fill(141,165,199,127);noStroke();
      beginShape();
      for(let pt of this.shape)vertex(pt[0],pt[1]);
      endShape(CLOSE);
      pop();
    }
  }
}
// ===================== STATION INTERIOR =====================
function generateStationElements(){
  stationElements=[];
  for(let i=0;i<12;i++)stationElements.push({type:'panel',x:random(width),y:random(height),w:random(60,160),h:random(40,120)});
  for(let i=0;i<15;i++){const y=random(height);stationElements.push({type:'pipe',x1:random(0,width*0.3),y1:y,x2:random(width*0.5,width),y2:y+random(-20,20),thick:random(2,6)});}
  for(let i=0;i<8;i++){const x=random(width);stationElements.push({type:'vpipe',x1:x,y1:random(0,height*0.3),x2:x+random(-15,15),y2:random(height*0.6,height),thick:random(2,5)});}
  for(let i=0;i<60;i++)stationElements.push({type:'rivet',x:random(width),y:random(height)});
  for(let i=0;i<4;i++)stationElements.push({type:'hatch',x:random(width*0.1,width*0.9),y:random(height*0.2,height*0.8),w:random(35,55),h:random(50,80)});
  for(let i=0;i<6;i++){const lights=[];for(let j=0;j<Math.floor(random(3,8));j++)lights.push({dx:random(-20,20),dy:random(-10,10),rate:random(0.02,0.08),col:random()>0.5?'r':'g'});
    stationElements.push({type:'controls',x:random(width*0.1,width*0.9),y:random(height*0.1,height*0.9),lights});}
  for(let i=0;i<8;i++)stationElements.push({type:'drip',x:random(width),y:random(height*0.1,height*0.5),speed:random(0.5,2),offset:random(1000)});
}
function drawStationInterior(){
  for(let el of stationElements){
    if(el.type==='panel'){stroke(50,55,50,90);strokeWeight(1);noFill();rect(el.x,el.y,el.w,el.h);stroke(40,45,40,50);line(el.x+4,el.y+4,el.x+el.w-4,el.y+4);}
    else if(el.type==='pipe'){stroke(70,65,55,100);strokeWeight(el.thick);line(el.x1,el.y1,el.x2,el.y2);noStroke();fill(80,75,60,100);circle((el.x1+el.x2)/2,(el.y1+el.y2)/2,el.thick*2);}
    else if(el.type==='vpipe'){stroke(65,60,50,90);strokeWeight(el.thick);line(el.x1,el.y1,el.x2,el.y2);}
    else if(el.type==='rivet'){fill(80,75,65,70);noStroke();circle(el.x,el.y,3);}
    else if(el.type==='hatch'){stroke(60,65,55,80);strokeWeight(2);noFill();rect(el.x,el.y,el.w,el.h,2);circle(el.x+el.w/2,el.y+el.h/2,15);line(el.x+el.w/2-5,el.y+el.h/2,el.x+el.w/2+5,el.y+el.h/2);}
    else if(el.type==='controls'){fill(25,28,25,80);noStroke();rect(el.x-25,el.y-15,50,30,3);for(let l of el.lights){const b=sin(frameCount*l.rate)*0.5+0.5;if(l.col==='r')fill(180*b,30,20,200*b);else fill(30,160*b,40,200*b);circle(el.x+l.dx,el.y+l.dy,3);}}
    else if(el.type==='drip'){const dy=(frameCount*el.speed+el.offset)%(height*0.6);fill(80,120,130,60-dy*0.08);noStroke();ellipse(el.x,el.y+dy,2,3);}
  }
}
function drawFlashlight(mx,my){const ctx=drawingContext;ctx.save();const g=ctx.createRadialGradient(mx,my,30,mx,my,280);
  g.addColorStop(0,'rgba(0,0,0,0)');g.addColorStop(0.4,'rgba(0,0,0,0.3)');g.addColorStop(0.7,'rgba(0,0,0,0.8)');g.addColorStop(1,'rgba(0,0,0,0.96)');ctx.fillStyle=g;ctx.fillRect(0,0,width,height);ctx.restore();}
// ===================== VISUALIZATIONS =====================
function drawVisualization(){
  if(!activeViz)return;const el=millis()-vizStart;
  if(el<3500){vizAlpha=0;return;}if(el<4500)vizAlpha=map(el,3500,4500,0,230);else vizAlpha=230;
  if(vizDismissing){const de=millis()-vizDismissStart;vizAlpha=map(de,0,800,230,0);
    if(de>800){activeViz=null;vizDismissing=false;vizAlpha=0;hideSub();document.getElementById('dismiss-hint').classList.remove('show');hotspotPhase='idle';return;}}
  push();fill(0,0,5,vizAlpha*0.75);noStroke();rect(0,0,width,height);
  const v=activeViz;
  if(v==='shrinking_belt')drawVizBelt(vizAlpha);else if(v==='deep_parade')drawVizParade(vizAlpha);else if(v==='sea_level')drawVizSea(vizAlpha);
  else if(v==='hierarchy')drawVizHierarchy(vizAlpha);else if(v==='daily_life')drawVizDaily(vizAlpha);
  else if(v==='air_oxygen')drawVizAir(vizAlpha);else if(v==='number39')drawVizN39(vizAlpha);
  else if(v==='mythology')drawVizMyth(vizAlpha);else if(v==='selection')drawVizSelection(vizAlpha);
  pop();
}
// --- MOLLWEIDE BELT ---
function mollweide(lat,lon,cx,cy,rw,rh){
  const phi=lat*PI/180,lam=lon*PI/180;
  let th=phi;for(let i=0;i<10;i++){const d=(2*th+sin(2*th)-PI*sin(phi))/(2+2*cos(2*th));th-=d;if(abs(d)<0.001)break;}
  return{x:cx+(2*sqrt(2)/PI)*lam*cos(th)*rw*0.45,y:cy-sqrt(2)*sin(th)*rh*0.45};
}
function drawVizBelt(a){

function drawVizAir(a){

  for(let i=0;i<4;i++){const sx=fx+i*(fw/4)+fw/8;

}
// --- MYTHOLOGY ---
function drawVizMyth(a){const cx=width/2,cy=height/2,t=min((millis()-vizStart-3500)/12000,1);const vY=cy-60-t*80;fill(220,170,60,a*0.12);noStroke();circle(cx,vY,120);fill(220,170,60,a*0.6);circle(cx,vY,30);stroke(220,160,60,a*0.2);strokeWeight(1);for(let i=0;i<16;i++){const ra=i*TWO_PI/16+frameCount*0.003,rl=40+sin(frameCount*0.02+i)*10;line(cx+cos(ra)*20,vY+sin(ra)*20,cx+cos(ra)*rl,vY+sin(ra)*rl);}const kY=cy+60+t*80;fill(180,200,220,a*0.08);noStroke();circle(cx,kY,90);fill(180,200,220,a*0.4);circle(cx,kY,24);fill(0,2,6,a*0.9);circle(cx+8,kY-2,20);for(let i=0;i<5;i++){fill(120,180,180,a*0.4*t);noStroke();circle(cx+sin(i*2.1)*30,map(i,0,4,vY+50,kY-40),3);}noStroke();fill(220,180,80,a*0.7);textSize(17);textAlign(CENTER);text('vahra',cx,vY-48);fill(220,180,80,a*0.4);textSize(13);text('she who turned away',cx,vY-30);fill(180,200,230,a*0.7);textSize(17);text('kheir',cx,kY+55);fill(180,200,230,a*0.4);textSize(13);text('protector · he who mourns',cx,kY+72);fill(120,180,180,a*0.55);textSize(15);text('the separation',cx,cy);fill(100,160,160,a*0.35);textSize(13);text('humanity caught between',cx,cy+20);}
// --- SELECTION ---
function drawVizSelection(a){const t=millis()-vizStart-3500;const lines=['they say my name','once','that\'s enough','something tightens inside me','i walk','too fast then slower','i could stop','but i keep walking','the path narrows','the air thins','the chamber is smaller than i expected','the altar stands in the center','the eye','two tubes','they lean toward me','too close','i kneel','the floor is cold','i am not the first','the light is not mine','i raise my gaze','slowly','toward the openings'];noStroke();textAlign(CENTER);for(let i=0;i<lines.length;i++){const ls=i*500;if(t<ls)break;const age=t-ls;const fi6=min(age/600,1),fo6=max(0,1-(age-4000)/1000),alp=min(fi6,fo6);if(alp<=0)continue;const warmth=i/lines.length;fill(140+warmth*80,180+warmth*40,180-warmth*120,a*0.7*alp);textSize(15+warmth*5);text(lines[i],width/2,height*0.12+i*24);}}
// ===================== SCENE CONFIG =====================
const sceneLabels=['the world','the station','the eye'];
function getSceneHotspots(s){
  if(s===0)return[
    {x:0.22,y:0.4,viz:'shrinking_belt',q:"the sun is lethal within hours.\nthe ice keeps expanding from both poles.\nonly a narrow belt remains — held open by heat from below."},
    {x:0.55,y:0.7,viz:'deep_parade',q:"the colder the water, the more oxygen it holds.\nthe more oxygen, the larger they grow.\nwe are no longer the largest thing in the ocean."},
    {x:0.82,y:0.35,viz:'sea_level',q:"the seven continents no longer exist.\nonly the peaks of former mountain ranges\nrise above the surface."}];
  if(s===1)return[
    {x:0.2,y:0.3,viz:'hierarchy',q:"proximity to light determines everything.\nthose above decide. those below maintain.\nthose at the bottom are forgotten."},
    {x:0.5,y:0.25,viz:'daily_life',q:"you eat what the ocean gives.\nyou sleep when the machines quiet.\nyou sing by striking the walls."},
    {x:0.75,y:0.6,viz:'air_oxygen',q:"one of the lower modules had pressure loss again.\nour systems are old — some built before the great flood.\nwe've kept them running with patches and improvisation."},
    {x:0.35,y:0.7,viz:'number39',q:"number 39 is a sea devil.\nnearly thirty years old. very sick.\nevery day, alex stops by.\nbut there is nothing he can do except wait."}];
  return[
    {x:0.35,y:0.55,viz:'mythology',q:"vahra. the sun goddess.\nshe turned away from us.\nkheir. the moon. he holds the ice.\nhe mourns."},
    {x:0.65,y:0.45,viz:'selection',q:"they say my name. once.\nthat's enough.\nsomething tightens inside me."}];
}
function buildScene(s){
  hotspots=[];particles=[];stationElements=[];creatures=[];fishSwarms=[];
  ascendVisible=false;sceneVisited[s]=0;activeViz=null;vizDismissing=false;hotspotPhase='idle';activeHotspot=null;
  document.getElementById('vignette').style.display=s===0?'block':'none';
  const cfg=getSceneHotspots(s);
  for(let c of cfg)hotspots.push(new Hotspot(c.x*width,c.y*height,c.viz,c.q,s));
  const pCount=s===2?60:s===1?100:350;
  for(let i=0;i<pCount;i++)particles.push(new Particle(s));
  genArch(s);
  if(s===0)for(let i=0;i<3;i++)fishSwarms.push(new FishSwarm());
  if(s>=1)generateStationElements();
  updateSceneAudio();updateMenu();
}
function genArch(s){
  archLines=[];
  if(s===0){for(let i=0;i<6;i++){archLines.push({x1:80+i*8,y1:0,x2:80+i*8,y2:height,a:30-i*4});archLines.push({x1:width-80-i*8,y1:0,x2:width-80-i*8,y2:height,a:30-i*4});}archLines.push({x1:0,y1:height*0.92,x2:width,y2:height*0.92,a:25});}
  else if(s===1){for(let i=0;i<8;i++){archLines.push({x1:60+i*6,y1:0,x2:60+i*6,y2:height,a:45-i*4});archLines.push({x1:width-60-i*6,y1:0,x2:width-60-i*6,y2:height,a:45-i*4});}for(let i=0;i<7;i++)archLines.push({x1:60,y1:height*0.12+i*(height*0.8/6),x2:width-60,y2:height*0.12+i*(height*0.8/6),a:30});}
  else{// Eye: station bg + shaft
    for(let i=0;i<4;i++){archLines.push({x1:60+i*12,y1:0,x2:60+i*12,y2:height,a:10});archLines.push({x1:width-60-i*12,y1:0,x2:width-60-i*12,y2:height,a:10});}
    for(let i=0;i<3;i++)archLines.push({x1:0,y1:height*0.25+i*height*0.25,x2:width,y2:height*0.25+i*height*0.25,a:6});
    archLines.push({x1:width/2,y1:0,x2:width/2,y2:height,a:50});archLines.push({x1:width/2-18,y1:0,x2:width/2-18,y2:height,a:20});archLines.push({x1:width/2+18,y1:0,x2:width/2+18,y2:height,a:20});}
}
class Particle{
  constructor(s){this.s=s;this.reset(true);this.sz=s===2?random(0.3,1.5):random(0.6,2.4);this.ba=s===2?random(80,200):random(40,140);this.po=random(TWO_PI);this.ps2=random(0.005,0.02);this.h=s===0?random(160,200):random(20,50);}
  reset(i){if(this.s===2){this.x=width/2+random(-22,22);this.y=i?random(height):0;this.vx=random(-0.03,0.03);this.vy=random(0.15,0.6);}else{this.x=random(width);this.y=i?random(height):random(-50,0);this.vx=random(-0.15,0.15);this.vy=random(0.05,0.3);}this.nx=random(1000);this.ny=random(1000);}
  update(){this.x+=this.vx+(noise(this.nx+frameCount*0.005)-0.5)*0.5;this.y+=this.vy+(noise(this.ny+frameCount*0.005)-0.5)*0.3;if(this.y>height+20||this.x<-20||this.x>width+20)this.reset(false);}
  display(){const p=sin(frameCount*this.ps2+this.po)*0.3+0.7,a2=this.ba*p;
    if(this.s===2){fill(220,200,150,a2);circle(this.x,this.y,this.sz);fill(220,200,150,a2*0.12);circle(this.x,this.y,this.sz*6);}
    else if(this.s===1){fill(this.h+140,this.h+100,this.h+50,a2);circle(this.x,this.y,this.sz);}
    else{fill(this.h,220,220,a2);circle(this.x,this.y,this.sz);fill(this.h,200,220,a2*0.15);circle(this.x,this.y,this.sz*4);}}
}
class Hotspot{
  constructor(x,y,vizId,quote,scn){this.x=x;this.y=y;this.vizId=vizId;this.quote=quote;this.scn=scn;this.hovered=false;this.visited=false;this.lastAct=0;
    this.sats=[];for(let i=0;i<12;i++)this.sats.push({a:random(TWO_PI),r:random(20,40),s:random(0.005,0.015),sz:random(1,2.5)});}
  update(){const d=dist(mouseX-camDX,mouseY-camDY,this.x,this.y);const w=this.hovered;this.hovered=d<45;
    if(this.hovered&&!w){curEl.classList.add('hover');playHoverPing();}else if(!this.hovered&&w)curEl.classList.remove('hover');}
  display(){const col=this.scn===2?[220,200,150]:this.scn===1?[200,170,100]:[180,230,230];
    const p=sin(frameCount*0.04)*0.3+0.7,r=14*p;
    for(let i=5;i>0;i--){fill(col[0],col[1],col[2],(this.visited?3:8)*p);circle(this.x,this.y,r*i*0.8);}
    fill(col[0]+40,col[1]+20,col[2]+20,(this.visited?100:200)*p);circle(this.x,this.y,r*0.5);
    for(let s of this.sats){s.a+=s.s;fill(col[0],col[1],col[2],(this.visited?40:100)*p);circle(this.x+cos(s.a)*s.r,this.y+sin(s.a)*s.r,s.sz);}
    if(this.hovered){fill(255,240,200,60);circle(this.x,this.y,r*2);}}
  activate(){
    if(millis()-this.lastAct<800||activeViz)return;this.lastAct=millis();
    if(!this.visited){this.visited=true;sceneVisited[scene]++;}
    hotspotPhase='quote';activeHotspot=this;
    showSub(this.quote);
    // Trigger hotspot MP3 sound
    const hp=hotspotPlayers[this.vizId];
    if(hp){try{hp.stop();hp.start();}catch(e){}}
    if(scene===0)creatures.push(new Creature());
    if(sceneVisited[scene]>=sceneRequired[scene])setTimeout(()=>{ascendVisible=true;},500);
  }
}
function drawAscend(){
  if(!ascendVisible||activeViz)return;
  ascendX=width/2;ascendY=scene===2?height/2:height*0.06;
  const pulse=sin(frameCount*0.05)*0.3+0.7;const col=scene===2?[220,200,120]:[180,230,230];
  for(let i=6;i>0;i--){fill(col[0],col[1],col[2],6*pulse);noStroke();circle(ascendX,ascendY,20*i*pulse);}
  fill(col[0]+30,col[1]+20,col[2]+20,220*pulse);circle(ascendX,ascendY,8);
  fill(col[0],col[1],col[2],180*pulse);textSize(12);textAlign(CENTER);text(scene===2?'enter':'ascend',ascendX,ascendY-22);
  ascendHovered=dist(mouseX-camDX,mouseY-camDY,ascendX,ascendY)<35;
  if(ascendHovered){fill(255,240,200,80);circle(ascendX,ascendY,30);curEl.classList.add('hover');}
}
function drawEyeClimax(){
  if(!eyeActive)return;const t=millis()-eyeStart;
  if(t<3000){const b=map(t,0,3000,0,220);fill(220,200,140,b*0.4);noStroke();rect(width/2-25,0,50,height);
    for(let i=0;i<25;i++){fill(220,200,140,b*0.5);circle(width/2+sin(frameCount*0.1+i)*map(t,0,3000,120,5),random(height),random(1,3));}
    showSub('the tubes adjust\nnow\ni raise my gaze\nslowly',null,'rgba(220,200,140,0.85)','22px');}
  else if(t<5500){fill(255,255,240,255);noStroke();rect(0,0,width,height);hideSub();}
  else if(t<11000){fill(0);noStroke();rect(0,0,width,height);}
  else if(t<17000){fill(0);noStroke();rect(0,0,width,height);const tf=map(t,11000,13000,0,1,true);fill(180,230,230,tf*200);textSize(24);textAlign(CENTER);text('then',width/2,height/2-18);text('light',width/2,height/2+18);}
  else{fill(0);noStroke();rect(0,0,width,height);}
}
function startTransition(target){transitionTarget=target;transitioning=true;transitionStart=millis();transitionBuilt=false;document.getElementById('transition-overlay').classList.add('active');}
function updateTransition(){if(!transitioning)return;const t=millis()-transitionStart;
  if(t>1800&&!transitionBuilt){transitionBuilt=true;scene=transitionTarget;buildScene(scene);}
  if(t>3500){transitioning=false;document.getElementById('transition-overlay').classList.remove('active');
    if(scene===1)showSub('the station.\nsystems humming. walls pressing close.',5000);
    else if(scene===2)showSub('the chamber. the altar.\nthe eye.',5000);
    else showSub('the world.\nyou wake. the air is heavy. wet.',5000);}}
// ===================== MAIN =====================
function setup(){createCanvas(windowWidth,windowHeight).parent(document.body);noStroke();textFont('Courier New');buildScene(0);lastInteract=millis();}
function windowResized(){resizeCanvas(windowWidth,windowHeight);buildScene(scene);}
function draw(){
  if(!started){background(0);return;}
  background(0,scene===1?1:0,scene===1?2:scene===0?6:2);
  camDX=sin(frameCount*0.003)*(scene===2?3:8);camDY=cos(frameCount*0.0025)*(scene===2?2:6);
  push();translate(camDX,camDY);
  const ac=scene===0?[120,180,180]:scene===1?[70,65,55]:[35,35,30];
  for(let l of archLines){stroke(ac[0],ac[1],ac[2],l.a);strokeWeight(0.5);line(l.x1,l.y1,l.x2,l.y2);}noStroke();
  if(scene>=1)drawStationInterior();
  if(scene===2){for(let i=0;i<6;i++){fill(220,200,140,(12-i*1.8));noStroke();rect(width/2-14-i*5,0,28+i*10,height);}}
  for(let p of particles){p.update();p.display();}
  if(scene===0){for(let sw of fishSwarms){sw.update();sw.display();}
    for(let i=creatures.length-1;i>=0;i--){if(!creatures[i].update())creatures.splice(i,1);else creatures[i].display();}}
  if(!activeViz&&!eyeActive){for(let h of hotspots){h.update();h.display();}drawAscend();}
  pop();
  if(scene===1&&!activeViz&&!eyeActive)drawFlashlight(mouseX,mouseY);
  drawVisualization();drawEyeClimax();updateTransition();
  if(millis()>20000&&millis()-lastGlitch>random(20000,40000)){triggerGlitch();lastGlitch=millis();}
  if(!eyeActive&&millis()-lastInteract>25000&&!idleWPlayed){playWhisper(random(['awake.','remember.','ascend.','listen.']));idleWPlayed=true;lastInteract=millis();}
}
function mousePressed(){if(!started||transitioning)return;lastInteract=millis();idleWPlayed=false;
  if(eyeActive)return;
  if(activeViz&&!vizDismissing&&millis()-vizStart>4500){dismissViz();return;}
  // Click anywhere advances from quote to viz
  if(hotspotPhase==='quote'&&activeHotspot){
    hotspotPhase='viz';hideSub();activeViz=activeHotspot.vizId;vizStart=millis();vizDismissing=false;
    setTimeout(()=>document.getElementById('dismiss-hint').classList.add('show'),4000);return;}
  if(ascendVisible&&ascendHovered&&!activeViz){
    if(scene<2){startTransition(scene+1);ascendVisible=false;}
    else{eyeActive=true;eyeStart=millis();ascendVisible=false;}return;}
  for(let h of hotspots)if(h.hovered){h.activate();break;}
}
function navScene(target){if(transitioning||eyeActive||activeViz||target===scene)return;startTransition(target);}
document.getElementById('start-overlay').addEventListener('click',async()=>{await Tone.start();initAudio();document.getElementById('start-overlay').classList.add('fade');
  setTimeout(()=>document.getElementById('start-overlay').style.display='none',3000);
  setTimeout(()=>{started=true;showSub("you wake.\nthe air is heavy. wet.",5000);},2500);});
</script></body></html>
