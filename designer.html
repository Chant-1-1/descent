<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DESCENT — Shape Editor</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0a0e12;color:#b8d8d8;font-family:'Courier New',monospace;height:100vh;overflow:hidden;}
h1{font-size:14px;letter-spacing:0.3em;text-transform:lowercase;opacity:0.85;padding:10px 16px 2px;}
.sub{font-size:10px;opacity:0.4;padding:0 16px 8px;letter-spacing:0.1em;}
.layout{display:grid;grid-template-columns:220px 1fr 220px;gap:8px;padding:0 8px 8px;height:calc(100vh - 52px);}
@media(max-width:800px){.layout{grid-template-columns:1fr;height:auto;overflow-y:auto;}}

.panel{background:#141a20;border:1px solid #2a3540;padding:12px;overflow-y:auto;}
.panel h2{font-size:11px;letter-spacing:0.2em;text-transform:lowercase;opacity:0.85;margin-bottom:8px;}
label{display:block;font-size:10px;opacity:0.55;margin:7px 0 2px;letter-spacing:0.08em;}
select,input[type=text]{background:#0a0e12;color:#b8d8d8;border:1px solid #2a3540;padding:6px;font-family:inherit;font-size:11px;width:100%;}
input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:4px;background:#2a3540;border-radius:2px;outline:none;cursor:pointer;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;background:#b8d8d8;border-radius:50%;cursor:pointer;}
input[type=range]::-moz-range-thumb{width:12px;height:12px;background:#b8d8d8;border-radius:50%;cursor:pointer;border:none;}
.row{display:flex;align-items:center;gap:6px;}
.row input[type=range]{flex:1;}
.val{font-size:10px;opacity:0.5;min-width:24px;text-align:right;}
input[type=color]{width:32px;height:24px;border:1px solid #2a3540;background:#0a0e12;cursor:pointer;padding:1px;}
.chk{display:flex;align-items:center;gap:6px;font-size:10px;opacity:0.7;margin:6px 0;cursor:pointer;}
.chk input{cursor:pointer;}

.btn{background:#2a3540;color:#b8d8d8;border:1px solid #3a4550;padding:8px 10px;width:100%;cursor:pointer;font-family:inherit;font-size:10px;letter-spacing:0.12em;text-transform:lowercase;margin-top:5px;}
.btn:hover{background:#3a4550;}
.btn.primary{background:#ff7755;color:#000;border-color:#ff7755;font-weight:bold;}
.btn.primary:hover{background:#ff8866;}
.btn.small{padding:4px 8px;width:auto;margin:0;}
.btn.danger:hover{background:#442222;border-color:#664444;}
hr{border:none;border-top:1px solid #1e2830;margin:10px 0;}

.canvas-wrap{position:relative;background:#030810;border:1px solid #2a3540;display:flex;align-items:center;justify-content:center;overflow:hidden;}
#canvas{width:100%;height:100%;cursor:crosshair;display:block;}
.canvas-info{position:absolute;bottom:6px;left:8px;font-size:10px;opacity:0.4;pointer-events:none;}
.canvas-hint{position:absolute;top:6px;left:8px;font-size:10px;opacity:0.35;pointer-events:none;}

.saved-item{background:#1a2025;border:1px solid #2a3540;padding:7px 8px;margin-bottom:4px;display:flex;align-items:center;gap:6px;cursor:pointer;}
.saved-item:hover{border-color:#3a4550;}
.saved-item .sw{width:20px;height:20px;border:1px solid #2a3540;flex-shrink:0;}
.saved-item .info{flex:1;min-width:0;}
.saved-item .nm{font-size:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.saved-item .meta{font-size:9px;opacity:0.35;}
.saved-item .del{background:none;border:none;color:#665555;cursor:pointer;font-size:13px;font-family:inherit;padding:0 2px;flex-shrink:0;}
.saved-item .del:hover{color:#ff5555;}

#modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:100;align-items:center;justify-content:center;padding:16px;}
#modal.show{display:flex;}
.modal-inner{background:#141a20;border:1px solid #2a3540;padding:16px;max-width:600px;width:100%;}
.modal-inner h3{font-size:11px;letter-spacing:0.2em;opacity:0.85;margin-bottom:10px;text-transform:lowercase;}
textarea{width:100%;height:300px;background:#0a0e12;color:#b8d8d8;border:1px solid #2a3540;padding:10px;font-family:inherit;font-size:11px;line-height:1.5;resize:vertical;}
.modal-actions{display:flex;gap:6px;margin-top:8px;justify-content:flex-end;}
.modal-actions button{background:#2a3540;color:#b8d8d8;border:1px solid #3a4550;padding:6px 14px;cursor:pointer;font-family:inherit;font-size:10px;text-transform:lowercase;}
.modal-actions button.primary{background:#ff7755;color:#000;border-color:#ff7755;}
</style>
</head>
<body>
<h1>descent — shape editor</h1>
<p class="sub">click = add point · drag = move · double-click = delete · ctrl+z = undo</p>

<div class="layout">
  <div class="panel">
    <h2>tools</h2>
    <div class="row">
      <button class="btn small" onclick="undo()">undo</button>
      <button class="btn small" onclick="points=[];render();">clear</button>
    </div>

    <hr>
    <h2>fill</h2>
    <div class="row">
      <input type="color" id="fill-col" value="#0a0e14" oninput="render()">
      <span style="font-size:10px;opacity:0.5;flex:1;">color</span>
    </div>
    <label>opacity</label>
    <div class="row">
      <input type="range" id="fill-op" min="5" max="100" value="70" oninput="document.getElementById('fill-op-v').textContent=this.value;render();">
      <span class="val" id="fill-op-v">70</span>
    </div>

    <hr>
    <h2>stroke</h2>
    <label class="chk"><input type="checkbox" id="stroke-on" onchange="render()"> show stroke</label>
    <div class="row">
      <input type="color" id="stroke-col" value="#1a3838" oninput="render()">
      <span style="font-size:10px;opacity:0.5;flex:1;">color</span>
    </div>
    <label>width</label>
    <div class="row">
      <input type="range" id="stroke-w" min="5" max="30" value="10" oninput="document.getElementById('stroke-w-v').textContent=(this.value/10).toFixed(1);render();">
      <span class="val" id="stroke-w-v">1.0</span>
    </div>

    <hr>
    <h2>view</h2>
    <label class="chk"><input type="checkbox" id="show-grid" onchange="render()"> grid</label>
    <label class="chk"><input type="checkbox" id="show-mirror" onchange="render()"> mirror (horizontal)</label>
    <label class="chk"><input type="checkbox" id="show-swarm" onchange="render()"> swarm preview</label>

    <hr>
    <h2>save</h2>
    <label>name</label>
    <input type="text" id="shape-name" placeholder="z.B. schwarm-fisch">
    <button class="btn primary" onclick="saveShape()">save shape</button>
  </div>

  <div class="canvas-wrap">
    <svg id="canvas" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg"></svg>
    <div class="canvas-info" id="info">0 points</div>
    <div class="canvas-hint">click to start drawing</div>
  </div>

  <div class="panel">
    <h2>saved shapes</h2>
    <div id="saved-list"></div>
    <button class="btn primary" onclick="exportAll()" style="margin-top:10px;">export all</button>
    <button class="btn danger" onclick="if(confirm('Alles löschen?')){saved=[];renderSaved();}">clear all</button>
  </div>
</div>

<div id="modal">
  <div class="modal-inner">
    <h3>send this to claude</h3>
    <textarea id="export-text" readonly></textarea>
    <div class="modal-actions">
      <button onclick="document.getElementById('modal').classList.remove('show')">close</button>
      <button class="primary" id="copy-btn" onclick="copyExport()">copy</button>
    </div>
  </div>
</div>

<script>
let points = [];
let saved = [];
let dragging = false;
let dragIdx = -1;
let mousePos = {x:0, y:0};
const PR = 6;
const CX = 300, CY = 200;
const svg = document.getElementById('canvas');

function toSVG(e){
  const r = svg.getBoundingClientRect();
  const src = e.touches ? e.touches[0] : e;
  return {
    x: Math.round((src.clientX - r.left) / r.width * 600),
    y: Math.round((src.clientY - r.top) / r.height * 400)
  };
}

function nearPoint(pos, thr){
  for(let i = 0; i < points.length; i++){
    const dx = points[i].x - pos.x, dy = points[i].y - pos.y;
    if(Math.sqrt(dx*dx + dy*dy) < thr) return i;
  }
  return -1;
}

svg.addEventListener('mousedown', e => {
  e.preventDefault();
  const pos = toSVG(e);
  const idx = nearPoint(pos, 12);
  if(idx >= 0){
    dragging = true; dragIdx = idx;
  } else {
    points.push({x: pos.x, y: pos.y});
    dragging = true; dragIdx = points.length - 1;
  }
  render();
});

svg.addEventListener('mousemove', e => {
  mousePos = toSVG(e);
  if(dragging && dragIdx >= 0){
    points[dragIdx].x = mousePos.x;
    points[dragIdx].y = mousePos.y;
    render();
  }
  updateInfo();
});

svg.addEventListener('mouseup', () => { dragging = false; dragIdx = -1; });
svg.addEventListener('mouseleave', () => { dragging = false; dragIdx = -1; });

svg.addEventListener('dblclick', e => {
  e.preventDefault();
  const pos = toSVG(e);
  const idx = nearPoint(pos, 14);
  if(idx >= 0){ points.splice(idx, 1); render(); }
});

svg.addEventListener('touchstart', e => {
  e.preventDefault();
  const pos = toSVG(e);
  const idx = nearPoint(pos, 20);
  if(idx >= 0){ dragging = true; dragIdx = idx; }
  else { points.push({x: pos.x, y: pos.y}); dragging = true; dragIdx = points.length - 1; }
  render();
}, {passive: false});

svg.addEventListener('touchmove', e => {
  e.preventDefault();
  if(dragging && dragIdx >= 0){
    const pos = toSVG(e);
    points[dragIdx].x = pos.x;
    points[dragIdx].y = pos.y;
    render();
  }
}, {passive: false});

svg.addEventListener('touchend', () => { dragging = false; dragIdx = -1; });

function render(){
  const fillCol = document.getElementById('fill-col').value;
  const fillOp = parseInt(document.getElementById('fill-op').value) / 100;
  const strokeOn = document.getElementById('stroke-on').checked;
  const strokeCol = document.getElementById('stroke-col').value;
  const strokeW = parseInt(document.getElementById('stroke-w').value) / 10;
  const showGrid = document.getElementById('show-grid').checked;
  const showMirror = document.getElementById('show-mirror').checked;
  const showSwarm = document.getElementById('show-swarm').checked;

  let h = '<rect width="600" height="400" fill="#030810"/>';

  if(showGrid){
    for(let x = 0; x <= 600; x += 30) h += `<line x1="${x}" y1="0" x2="${x}" y2="400" stroke="#1a2530" stroke-width="0.3"/>`;
    for(let y = 0; y <= 400; y += 30) h += `<line x1="0" y1="${y}" x2="600" y2="${y}" stroke="#1a2530" stroke-width="0.3"/>`;
    h += `<line x1="${CX}" y1="0" x2="${CX}" y2="400" stroke="#2a3540" stroke-width="0.5"/>`;
    h += `<line x1="0" y1="${CY}" x2="600" y2="${CY}" stroke="#2a3540" stroke-width="0.5"/>`;
  }

  h += '<circle cx="55" cy="35" r="0.8" fill="#3aaa9a" opacity="0.15"/>';
  h += '<circle cx="520" cy="65" r="1" fill="#3aaa9a" opacity="0.12"/>';
  h += '<circle cx="170" cy="340" r="0.9" fill="#3aaa9a" opacity="0.1"/>';
  h += '<circle cx="470" cy="310" r="0.7" fill="#3aaa9a" opacity="0.12"/>';

  const sa = strokeOn ? `stroke="${strokeCol}" stroke-width="${strokeW}"` : 'stroke="none"';

  if(points.length >= 2){
    const pd = mkPath(points);

    if(showSwarm && points.length >= 3){
      const offs = [
        [-130,-70,-6,.9],[-40,-85,4,.85],[70,-60,-10,.8],
        [-150,-10,-3,.95],[-55,5,2,1],[55,-15,-8,.9],[140,-5,-4,.85],
        [-120,60,-5,.88],[-15,50,7,.92],[80,65,-6,.87],[150,55,-3,.82],
        [-70,120,-4,.86],[40,115,3,.9],[120,110,-7,.84],
        [-20,170,-2,.88],[75,165,-6,.85]
      ];
      const cp = mkCentered();
      offs.forEach(([ox,oy,or,os]) => {
        h += `<g transform="translate(${CX+ox},${CY+oy}) rotate(${or}) scale(${os})">`;
        h += `<path d="${cp}" fill="${fillCol}" opacity="${fillOp*os}" ${sa}/>`;
        h += '</g>';
      });
    } else {
      h += `<path d="${pd}" fill="${fillCol}" opacity="${fillOp}" ${sa}/>`;

      if(showMirror && points.length >= 3){
        h += `<g transform="translate(${CX*2},0) scale(-1,1)">`;
        h += `<path d="${pd}" fill="${fillCol}" opacity="${fillOp*0.35}" stroke="${strokeOn?strokeCol:'none'}" stroke-width="${strokeW}" />`;
        h += '</g>';
      }

      for(let i = 0; i < points.length; i++){
        const p = points[i];
        if(i < points.length - 1){
          const n = points[i+1];
          h += `<line x1="${p.x}" y1="${p.y}" x2="${n.x}" y2="${n.y}" stroke="#4a8a8a" stroke-width="0.5" opacity="0.35"/>`;
        }
        const act = (dragIdx === i);
        h += `<circle cx="${p.x}" cy="${p.y}" r="${act?8:PR}" fill="${act?'#ff7755':'#4a8a8a'}" opacity="${act?.9:.65}" stroke="#b8d8d8" stroke-width="0.5"/>`;
        h += `<text x="${p.x}" y="${p.y-10}" text-anchor="middle" fill="#4a8a8a" font-size="8" font-family="Courier New" opacity="0.45">${i+1}</text>`;
      }
    }
  }

  svg.innerHTML = h;
  updateInfo();
}

function mkPath(pts){
  if(pts.length < 2) return '';
  return 'M ' + pts.map(p => p.x+','+p.y).join(' L ') + ' Z';
}

function mkCentered(){
  if(points.length < 2) return '';
  const cx = points.reduce((s,p) => s+p.x, 0) / points.length;
  const cy = points.reduce((s,p) => s+p.y, 0) / points.length;
  return 'M ' + points.map(p => Math.round(p.x-cx)+','+Math.round(p.y-cy)).join(' L ') + ' Z';
}

function updateInfo(){
  const rx = mousePos.x - CX, ry = mousePos.y - CY;
  document.getElementById('info').textContent = `${points.length} points · cursor: (${rx}, ${ry})`;
}

function undo(){ if(points.length > 0){ points.pop(); render(); } }

function saveShape(){
  const name = document.getElementById('shape-name').value.trim();
  if(!name){ alert('Gib der Form einen Namen.'); return; }
  if(points.length < 3){ alert('Mindestens 3 Punkte.'); return; }
  const cx = points.reduce((s,p) => s+p.x, 0) / points.length;
  const cy = points.reduce((s,p) => s+p.y, 0) / points.length;
  saved.push({
    name,
    points: points.map(p => ({x:p.x, y:p.y})),
    centered: points.map(p => ({x:Math.round(p.x-cx), y:Math.round(p.y-cy)})),
    color: document.getElementById('fill-col').value,
    opacity: parseInt(document.getElementById('fill-op').value),
    strokeOn: document.getElementById('stroke-on').checked,
    strokeCol: document.getElementById('stroke-col').value,
    strokeW: parseInt(document.getElementById('stroke-w').value) / 10
  });
  document.getElementById('shape-name').value = '';
  renderSaved();
}

function renderSaved(){
  const list = document.getElementById('saved-list');
  list.innerHTML = '';
  saved.forEach((s, i) => {
    const item = document.createElement('div');
    item.className = 'saved-item';
    item.innerHTML = `
      <div class="sw" style="background:${s.color};opacity:${s.opacity/100}"></div>
      <div class="info"><div class="nm">${s.name}</div><div class="meta">${s.points.length} pts</div></div>
      <button class="del" onclick="event.stopPropagation();saved.splice(${i},1);renderSaved();">×</button>`;
    item.onclick = () => loadShape(s);
    list.appendChild(item);
  });
}

function loadShape(s){
  points = s.points.map(p => ({x:p.x, y:p.y}));
  document.getElementById('fill-col').value = s.color;
  document.getElementById('fill-op').value = s.opacity;
  document.getElementById('fill-op-v').textContent = s.opacity;
  document.getElementById('stroke-on').checked = s.strokeOn;
  document.getElementById('stroke-col').value = s.strokeCol;
  document.getElementById('stroke-w').value = Math.round(s.strokeW * 10);
  document.getElementById('stroke-w-v').textContent = s.strokeW.toFixed(1);
  document.getElementById('shape-name').value = s.name;
  render();
}

function exportAll(){
  if(saved.length === 0){ alert('Noch nichts gespeichert.'); return; }
  let t = 'DESCENT — Shape Designs\n====================================\n';
  t += 'Generated: ' + new Date().toLocaleString() + '\n\n';
  saved.forEach((s, i) => {
    t += `[${i+1}] ${s.name.toUpperCase()}\n`;
    t += `  Color: ${s.color} @ ${s.opacity}%\n`;
    if(s.strokeOn) t += `  Stroke: ${s.strokeCol}, ${s.strokeW}px\n`;
    const xs = s.centered.map(p=>p.x), ys = s.centered.map(p=>p.y);
    t += `  Size: ${Math.max(...xs)-Math.min(...xs)} × ${Math.max(...ys)-Math.min(...ys)}px\n`;
    t += `  Points (centered): ${s.centered.map(p=>`(${p.x},${p.y})`).join(' ')}\n\n`;
  });
  document.getElementById('export-text').value = t;
  document.getElementById('modal').classList.add('show');
}

function copyExport(){
  const ta = document.getElementById('export-text');
  ta.select(); ta.setSelectionRange(0, 99999);
  try{ document.execCommand('copy'); } catch(e){}
  if(navigator.clipboard) navigator.clipboard.writeText(ta.value).catch(()=>{});
  document.getElementById('copy-btn').textContent = '✓ copied';
  setTimeout(() => { document.getElementById('copy-btn').textContent = 'copy'; }, 1500);
}

document.addEventListener('keydown', e => {
  if(e.key === 'z' && (e.ctrlKey || e.metaKey)){ e.preventDefault(); undo(); }
});

render();
</script>
</body>
</html>
